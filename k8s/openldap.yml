apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
  labels:
    app: openldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      containers:
        - name: openldap
          image: osixia/openldap:1.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 389
          env:
            - name: LDAP_ORGANISATION
              value: "CircleGuard"
            - name: LDAP_DOMAIN
              value: "circleguard.edu"
            - name: LDAP_ADMIN_PASSWORD
              value: "admin"
---
apiVersion: v1
kind: Service
metadata:
  name: openldap
spec:
  type: ClusterIP
  selector:
    app: openldap
  ports:
    - port: 389
      targetPort: 389
