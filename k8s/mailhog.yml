apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  labels:
    app: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:latest
          imagePullPolicy: IfNotPresent
          args: ["-smtp-bind-addr", "0.0.0.0:25"]
          ports:
            - containerPort: 25
            - containerPort: 8025
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
spec:
  type: ClusterIP
  selector:
    app: mailhog
  ports:
    - name: smtp
      port: 25
      targetPort: 25
    - name: ui
      port: 8025
      targetPort: 8025
