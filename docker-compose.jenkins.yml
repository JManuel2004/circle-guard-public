services:
  jenkins:
    build:
      context: docker/jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"    # Jenkins UI
      - "50000:50000"  # JNLP agent port (windows-host agent)
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-in-Docker (socket passthrough)
    environment:
      DOCKER_BUILDKIT: "1"

volumes:
  jenkins_home:
    name: jenkins_home
